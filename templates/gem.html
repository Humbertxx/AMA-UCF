<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Settings (Preview)</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">AMA Calendar Setup</h1>

        <form class="space-y-4">
            
            <!-- Calendar Name Field -->
            <div>
                <label for="calendar_name" class="block text-sm font-medium text-gray-700 mb-1">Calendar Name</label>
                <input type="text" id="calendar_name" name="calendar_name" value="AMA Calendar" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Timezone Field -->
            <div>
                <label for="calendar_timezone" class="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
                <input type="text" id="calendar_timezone" name="calendar_timezone" value="America/New_York" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Worksheet ID Field -->
            <div>
                <label for="worksheet_id" class="block text-sm font-medium text-gray-700 mb-1">Worksheet ID</label>
                <input type="text" id="worksheet_id" name="worksheet_id" placeholder="Enter Worksheet ID" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Access Code (Password) Field -->
            <div>
                <label for="access_code" class="block text-sm font-medium text-gray-700 mb-1">Access Code</label>
                <input type="password" id="access_code" name="access_code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Secret Dir (File Upload) -->
            <div class="pt-2">
                <label for="secret_dir" class="block text-sm font-medium text-gray-700 mb-1">Secret Dir</label>
                <input type="file" id="secret_dir" name="secret_dir" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <!-- Target Calendar ID (File Upload) -->
            <div class="pt-2">
                <label for="target_calendar_id" class="block text-sm font-medium text-gray-700 mb-1">Target Calendar ID</label>
                <input type="file" id="target_calendar_id" name="target_calendar_id" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <input type="submit" value="Setting are Ready" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition duration-150 cursor-pointer">
            </div>

        </form>
    </div>

</body>
</html>
